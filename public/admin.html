<!doctype html>
<html>
  <head>
    <title>Admin Dashboard - Cinema E-Booking</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
      .container { max-width: 1100px; margin: 0 auto; }
      h1 { text-align: center; color: #333; }
      .dashboard { display: flex; gap: 20px; margin-top: 20px; }
      .sidebar { width: 220px; flex-shrink: 0; }
      .sidebar-item { display: block; padding: 12px 16px; background: white; margin-bottom: 4px; border-radius: 6px; cursor: pointer; font-size: 15px; color: #333; border: 2px solid transparent; transition: all 0.2s; }
      .sidebar-item:hover { background: #e9ecef; }
      .sidebar-item.active { border-color: #007bff; background: #e7f1ff; color: #007bff; font-weight: bold; }
      .main-content { flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 400px; }
      .main-content h2 { font-size: 20px; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 8px; margin: 0 0 20px; }
      .placeholder { color: #666; font-style: italic; text-align: center; padding: 40px 20px; }
      .placeholder p { margin: 10px 0; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
      .stat-card { background: #f8f9fa; padding: 20px; border-radius: 6px; text-align: center; }
      .stat-card .number { font-size: 32px; font-weight: bold; color: #007bff; }
      .stat-card .label { color: #666; font-size: 14px; margin-top: 5px; }
    </style>
  </head>
  <body>
    <script src="nav.js"></script>
    <div class="container">
      <h1>Admin Dashboard</h1>

      <div class="dashboard">
        <div class="sidebar">
          <div class="sidebar-item active" onclick="showPanel('movies')">Manage Movies</div>
          <div class="sidebar-item" onclick="showPanel('promotions')">Manage Promotions</div>
          <div class="sidebar-item" onclick="showPanel('users')">Manage Users</div>
          <div class="sidebar-item" onclick="showPanel('showtimes')">Manage Showtimes</div>
        </div>

        <div class="main-content" id="panelContent">
          <!-- Default: Manage Movies -->
        </div>
      </div>
    </div>

    <script>
      // Redirect if not logged in or not admin
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (!localStorage.getItem('token') || !user || user.role !== 'Admin') {
        window.location.href = 'login.html';
      }

      const panels = {
        movies: `
          <h2>Manage Movies</h2>
          <div class="stats">
            <div class="stat-card"><div class="number">--</div><div class="label">Total Movies</div></div>
            <div class="stat-card"><div class="number">--</div><div class="label">Now Playing</div></div>
            <div class="stat-card"><div class="number">--</div><div class="label">Coming Soon</div></div>
          </div>
          <div class="placeholder">
            <p>Movie management features coming in Sprint 3.</p>
            <p>You will be able to add, edit, and remove movies here.</p>
          </div>
        `,
        promotions: `
          <h2>Manage Promotions</h2>
          <div class="placeholder">
            <p>Promotion management features coming in Sprint 3.</p>
            <p>You will be able to create and send promotional emails here.</p>
          </div>
        `,
        users: `
          <h2>Manage Users</h2>
          <div class="placeholder">
            <p>User management features coming in Sprint 3.</p>
            <p>You will be able to view, suspend, and manage user accounts here.</p>
          </div>
        `,
        showtimes: `
          <h2>Manage Showtimes</h2>
          <div class="placeholder">
            <p>Showtime management features coming in Sprint 3.</p>
            <p>You will be able to add, edit, and remove showtimes for movies here.</p>
          </div>
        `
      };

      function showPanel(panel) {
        document.getElementById('panelContent').innerHTML = panels[panel];
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.classList.remove('active');
        });
        event.target.classList.add('active');
      }

      // Load default panel
      document.addEventListener('DOMContentLoaded', () => {
        showPanel('movies');
      });
    </script>
  </body>
</html>
