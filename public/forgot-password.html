<!doctype html>
<html>
  <head>
    <title>Forgot Password - Cinema E-Booking</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
      .container { max-width: 400px; margin: 60px auto; }
      h1 { text-align: center; color: #333; }
      p.subtitle { text-align: center; color: #666; margin-bottom: 20px; }
      .form-section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 14px; }
      .required::after { content: " *"; color: #dc3545; }
      .form-group input { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
      .btn { display: block; width: 100%; padding: 12px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
      .btn:hover { background: #0056b3; }
      .alert { padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none; }
      .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      .links { text-align: center; margin-top: 15px; font-size: 14px; }
      .links a { color: #007bff; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <script src="nav.js"></script>
    <div class="container">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link.</p>

      <div id="alertBox" class="alert"></div>

      <div class="form-section">
        <form onsubmit="handleForgot(event)">
          <div class="form-group">
            <label class="required" for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
        </form>
      </div>

      <div class="links">
        <p><a href="login.html">Back to Login</a></p>
      </div>
    </div>

    <script>
      function showAlert(message, type) {
        const box = document.getElementById('alertBox');
        box.textContent = message;
        box.className = 'alert alert-' + type;
        box.style.display = 'block';
      }

      async function handleForgot(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = 'Sending...';

        try {
          const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          const data = await res.json();
          showAlert(data.message || 'If an account with that email exists, a password reset link has been sent.', 'success');
        } catch (err) {
          showAlert('Something went wrong. Please try again.', 'error');
        }

        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = 'Send Reset Link';
      }
    </script>
  </body>
</html>
