<!doctype html>
<html>
  <head>
    <title>Movie Details</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f0f0f0;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #007bff;
        text-decoration: none;
        font-size: 15px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .movie-header {
        display: flex;
        align-items: flex-start;
        gap: 30px;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 25px;
      }
      .movie-poster {
        width: 200px;
        min-width: 200px;
        height: 280px;
        object-fit: cover;
        border-radius: 6px;
        background: #ccc;
      }
      .movie-info {
        flex: 1;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .movie-title {
        font-size: 28px;
        font-weight: bold;
        margin: 0;
        color: #222;
      }
      .heart-btn {
        background: none;
        border: none;
        font-size: 26px;
        cursor: pointer;
        color: #ccc;
        transition: color 0.2s;
        padding: 0;
        line-height: 1;
      }
      .heart-btn:hover {
        color: #dc3545;
      }
      .heart-btn.favorited {
        color: #dc3545;
      }
      .badges {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
      }
      .badge-rating {
        background: #007bff;
        color: white;
      }
      .badge-genre {
        background: #6c757d;
        color: white;
      }
      .badge-status {
        background: #28a745;
        color: white;
      }
      .badge-status.coming-soon {
        background: #fd7e14;
      }
      .movie-description {
        font-size: 15px;
        color: #444;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .movie-meta {
        font-size: 14px;
        color: #555;
        margin-bottom: 6px;
      }
      .movie-meta strong {
        color: #333;
      }
      .release-date {
        font-size: 14px;
        color: #666;
      }
      .section {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 25px;
      }
      .section h2 {
        font-size: 20px;
        color: #333;
        border-bottom: 2px solid #007bff;
        padding-bottom: 10px;
        margin: 0 0 20px;
      }
      /* 2.2: Embedded trailer */
      .trailer-wrapper {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 6px;
      }
      .trailer-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 6px;
      }
      /* 2.2: Hardcoded showtimes */
      .showtimes {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .showtime-btn {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .showtime-btn:hover {
        background: #0056b3;
      }
      .recommendation-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }
      .recommendation-card {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 14px;
        cursor: pointer;
        background: #fafafa;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .recommendation-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      }
      .recommendation-card h3 {
        font-size: 16px;
        margin: 0 0 8px;
        color: #222;
      }
      .recommendation-meta {
        color: #666;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .recommendation-reason {
        color: #444;
        font-size: 14px;
        line-height: 1.4;
        margin: 0;
      }
      .ai-source {
        color: #666;
        font-size: 13px;
        margin-bottom: 14px;
      }
      .error-msg {
        text-align: center;
        padding: 40px;
        font-size: 18px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <script src="nav.js"></script>
    <div class="container">
      <a class="back-link" href="index.html">&larr; Back to Home</a>
      <div id="content">Loading...</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const movieId = params.get("id");
      const isLoggedIn = !!localStorage.getItem('token');
      let isFavorited = false;

      if (!movieId) {
        document.getElementById("content").innerHTML =
          '<div class="error-msg">No movie selected.</div>';
      } else {
        loadMovie();
      }

      async function loadMovie() {
        try {
          // Load favorite status if logged in
          if (isLoggedIn) {
            const favRes = await authFetch('/api/favorites/ids');
            if (favRes && favRes.ok) {
              const favIds = await favRes.json();
              isFavorited = favIds.includes(parseInt(movieId));
            }
          }

          const res = await fetch("/api/movies/" + movieId);
          if (!res.ok) throw new Error("Movie not found");
          const movie = await res.json();
          await renderMovie(movie);
        } catch (err) {
          document.getElementById("content").innerHTML =
            '<div class="error-msg">Movie not found.</div>';
        }
      }

      async function renderMovie(m) {
        const statusClass = m.status === "Coming Soon" ? "coming-soon" : "";

        // Load showtimes from database
        let showtimeHtml = '<p style="color:#666;">No showtimes available.</p>';
        try {
          const stRes = await fetch('/api/movies/' + m.movie_id + '/showtimes');
          const showtimes = await stRes.json();
          if (showtimes.length > 0) {
            // Group by date
            const grouped = {};
            showtimes.forEach(st => {
              if (!grouped[st.show_date]) grouped[st.show_date] = [];
              grouped[st.show_date].push(st);
            });
            showtimeHtml = '';
            Object.keys(grouped).sort().forEach(date => {
              const d = new Date(date + 'T00:00:00');
              const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
              showtimeHtml += `<div style="margin-bottom:12px;"><strong style="display:block;margin-bottom:6px;">${dateLabel}</strong><div class="showtimes">`;
              grouped[date].forEach(st => {
                const [h, min] = st.show_time.split(':');
                const hr = parseInt(h);
                const ampm = hr >= 12 ? 'PM' : 'AM';
                const hr12 = hr % 12 || 12;
                const timeStr = hr12 + ':' + min + ' ' + ampm;
                const roomName = st.Showroom ? st.Showroom.name : '';
                showtimeHtml += `<button class="showtime-btn" onclick="goToBooking(${m.movie_id}, ${st.showtime_id})" title="${roomName}">${timeStr}<br><span style="font-size:11px;opacity:0.8;">${roomName}</span></button>`;
              });
              showtimeHtml += '</div></div>';
            });
          }
        } catch (err) {
          showtimeHtml = '<p style="color:#dc3545;">Failed to load showtimes.</p>';
        }

        // Build trailer embed
        let trailerHtml;
        if (m.trailer && m.trailer.includes("/embed/")) {
          trailerHtml = `
            <div class="trailer-wrapper">
              <iframe src="${m.trailer}" allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
              </iframe>
            </div>`;
        } else if (m.trailer) {
          trailerHtml = `<a href="${m.trailer}" target="_blank">Watch Trailer</a>`;
        } else {
          trailerHtml = "<p>No trailer available.</p>";
        }

        // Heart button for logged-in users
        const heartHtml = isLoggedIn
          ? `<button class="heart-btn ${isFavorited ? 'favorited' : ''}" onclick="toggleFavorite()" title="Toggle favorite" id="heartBtn">${isFavorited ? '&#9829;' : '&#9825;'}</button>`
          : '';

        // Extra info (director, producer, cast)
        let extraInfo = '';
        if (m.director) extraInfo += `<p class="movie-meta"><strong>Director:</strong> ${m.director}</p>`;
        if (m.producer) extraInfo += `<p class="movie-meta"><strong>Producer:</strong> ${m.producer}</p>`;
        if (m.cast_members) extraInfo += `<p class="movie-meta"><strong>Cast:</strong> ${m.cast_members}</p>`;

        document.getElementById("content").innerHTML = `
          <div class="movie-header">
            <img class="movie-poster" src="${m.poster}" alt="${m.title} poster"
              onerror="this.style.background='#ccc';this.removeAttribute('src')">
            <div class="movie-info">
              <div class="title-row">
                <h1 class="movie-title">${m.title}</h1>
                ${heartHtml}
              </div>
              <div class="badges">
                <span class="badge badge-rating">${m.rating || "NR"}</span>
                <span class="badge badge-genre">${m.genre}</span>
                <span class="badge badge-status ${statusClass}">${m.status}</span>
              </div>
              <p class="movie-description">${m.description}</p>
              ${extraInfo}
              <p class="release-date">Release Date: ${formatDate(m.release_date)}</p>
            </div>
          </div>

          <div class="section">
            <h2>Trailer</h2>
            ${trailerHtml}
          </div>

          <div class="section">
            <h2>Showtimes</h2>
            ${showtimeHtml}
          </div>

          <div class="section">
            <h2>AI Recommendations</h2>
            <div id="aiRecommendations"><p style="color:#666;">Loading Gemini recommendations...</p></div>
          </div>
        `;

        loadRecommendations(m.movie_id);
      }

      async function loadRecommendations(currentMovieId) {
        const container = document.getElementById('aiRecommendations');
        try {
          const headers = {};
          const token = localStorage.getItem('token');
          if (token) headers.Authorization = 'Bearer ' + token;

          const res = await fetch(`/api/movies/${currentMovieId}/recommendations`, { headers });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Failed to load recommendations.');
          }

          if (!data.recommendations || data.recommendations.length === 0) {
            container.innerHTML = '<p style="color:#666;">No recommendations available yet.</p>';
            return;
          }

          container.innerHTML = `
            <div class="ai-source">Generated by ${data.source} from this movie, available catalog, and your favorites when logged in.</div>
            <div class="recommendation-grid">
              ${data.recommendations.map(r => `
                <div class="recommendation-card" onclick="viewRecommendedMovie(${r.movie_id})">
                  <h3>${r.title}</h3>
                  <div class="recommendation-meta">${r.genre} &middot; ${r.rating || 'NR'} &middot; ${r.status}</div>
                  <p class="recommendation-reason">${r.reason}</p>
                </div>
              `).join('')}
            </div>
          `;
        } catch (err) {
          console.error('AI recommendations error:', err);
          container.innerHTML = '<p style="color:#dc3545;">AI recommendations are unavailable right now.</p>';
        }
      }

      function viewRecommendedMovie(recommendedMovieId) {
        window.location.href = `movie.html?id=${recommendedMovieId}`;
      }

      async function toggleFavorite() {
        const method = isFavorited ? 'DELETE' : 'POST';
        try {
          const res = await authFetch(`/api/favorites/${movieId}`, { method });
          if (!res) return;
          if (res.ok) {
            isFavorited = !isFavorited;
            const btn = document.getElementById('heartBtn');
            btn.innerHTML = isFavorited ? '&#9829;' : '&#9825;';
            btn.className = 'heart-btn' + (isFavorited ? ' favorited' : '');
          }
        } catch (err) {
          console.error('Toggle favorite error:', err);
        }
      }

      function formatDate(dateStr) {
        if (!dateStr) return "TBD";
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
          timeZone: "UTC",
        });
      }

      function goToBooking(movieId, showtimeId) {
        window.location.href =
          "booking.html?id=" + movieId + "&showtime_id=" + showtimeId;
      }
    </script>
  </body>
</html>
