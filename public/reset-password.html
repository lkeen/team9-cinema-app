<!doctype html>
<html>
  <head>
    <title>Reset Password - Cinema E-Booking</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
      .container { max-width: 400px; margin: 60px auto; }
      h1 { text-align: center; color: #333; }
      .form-section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 14px; }
      .required::after { content: " *"; color: #dc3545; }
      .form-group input { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
      .btn { display: block; width: 100%; padding: 12px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
      .btn:hover { background: #0056b3; }
      .alert { padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none; }
      .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .error-msg { color: #dc3545; font-size: 14px; margin-top: 5px; display: none; }
      .pw-requirements { font-size: 12px; color: #666; margin-top: 4px; }
      .pw-requirements span { display: block; }
      .pw-requirements span.met { color: #28a745; }
      .pw-requirements span.unmet { color: #dc3545; }
      .links { text-align: center; margin-top: 15px; font-size: 14px; }
      .links a { color: #007bff; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <script src="nav.js"></script>
    <div class="container">
      <h1>Reset Password</h1>

      <div id="alertBox" class="alert"></div>

      <div class="form-section">
        <form onsubmit="handleReset(event)">
          <div class="form-group">
            <label class="required" for="newPassword">New Password</label>
            <input type="password" id="newPassword" required oninput="checkPasswordStrength()">
            <div class="pw-requirements" id="pwReqs">
              <span id="pw-length">At least 8 characters</span>
              <span id="pw-upper">1 uppercase letter</span>
              <span id="pw-lower">1 lowercase letter</span>
              <span id="pw-number">1 number</span>
              <span id="pw-special">1 special character</span>
            </div>
          </div>
          <div class="form-group">
            <label class="required" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required oninput="checkPasswordMatch()">
            <div class="error-msg" id="matchError">Passwords do not match</div>
          </div>
          <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>
      </div>

      <div class="links">
        <p><a href="login.html">Back to Login</a></p>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.getElementById('alertBox').textContent = 'Invalid reset link. No token provided.';
        document.getElementById('alertBox').className = 'alert alert-error';
        document.getElementById('alertBox').style.display = 'block';
      }

      function checkPasswordStrength() {
        const pw = document.getElementById('newPassword').value;
        const checks = {
          'pw-length': pw.length >= 8,
          'pw-upper': /[A-Z]/.test(pw),
          'pw-lower': /[a-z]/.test(pw),
          'pw-number': /[0-9]/.test(pw),
          'pw-special': /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)
        };
        for (const [id, met] of Object.entries(checks)) {
          document.getElementById(id).className = met ? 'met' : 'unmet';
        }
      }

      function checkPasswordMatch() {
        const pw = document.getElementById('newPassword').value;
        const cpw = document.getElementById('confirmPassword').value;
        document.getElementById('matchError').style.display = (cpw && pw !== cpw) ? 'block' : 'none';
      }

      function showAlert(message, type) {
        const box = document.getElementById('alertBox');
        box.textContent = message;
        box.className = 'alert alert-' + type;
        box.style.display = 'block';
        window.scrollTo(0, 0);
      }

      async function handleReset(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          showAlert('Passwords do not match.', 'error');
          return;
        }

        const pwChecks = [
          newPassword.length >= 8,
          /[A-Z]/.test(newPassword),
          /[a-z]/.test(newPassword),
          /[0-9]/.test(newPassword),
          /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPassword)
        ];
        if (pwChecks.includes(false)) {
          showAlert('Password must be at least 8 characters with 1 uppercase, 1 lowercase, 1 number, and 1 special character.', 'error');
          return;
        }

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = 'Resetting...';

        try {
          const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword, confirmPassword })
          });

          const data = await res.json();

          if (!res.ok) {
            showAlert(data.error, 'error');
          } else {
            showAlert(data.message, 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);
          }
        } catch (err) {
          showAlert('Something went wrong. Please try again.', 'error');
        }

        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = 'Reset Password';
      }
    </script>
  </body>
</html>
